<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Life Autobiography Writer</title>
  <desc id="desc">A refined GitHub header for an interview-driven autobiography writing skill, combining literary nonfiction, life interviews, scholar rocks, and quiet astrological structure.</desc>
  <defs>
    <radialGradient id="paperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 312) rotate(90) scale(330 500)">
      <stop stop-color="#FFF7E6"/>
      <stop offset="0.45" stop-color="#F3E2C8"/>
      <stop offset="1" stop-color="#17120F"/>
    </radialGradient>
    <linearGradient id="inkWash" x1="90" y1="70" x2="1200" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#241B17"/>
      <stop offset="0.52" stop-color="#090807"/>
      <stop offset="1" stop-color="#211611"/>
    </linearGradient>
    <linearGradient id="stoneShade" x1="786" y1="186" x2="986" y2="496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8EFE0"/>
      <stop offset="0.44" stop-color="#C8B69E"/>
      <stop offset="1" stop-color="#5B5148"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
