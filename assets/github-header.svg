      <circle cx="42" cy="71" r="0.9" fill="#FFFFFF" opacity="0.06"/>
      <circle cx="88" cy="31" r="0.8" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="108" cy="96" r="1" fill="#000000" opacity="0.12"/>
    </pattern>
  </defs>

